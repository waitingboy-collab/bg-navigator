<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калкулатор Пътуване & Разход</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0275d8; margin-bottom: 20px; }
        .input-group { background: #eef7ff; padding: 15px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #bce1ff; }
        .segment { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-left: 5px solid #0275d8; border-radius: 4px; }
        .segment h4 { margin: 0 0 10px 0; color: #555; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #5cb85c; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #4cae4c; }
        #results { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .warning { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
        .success { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 БГ Навигатор & Горивен калкулатор</h2>
    
    <div class="input-group">
        <label>🕒 Час на тръгване:</label>
        <input type="time" id="departure-time" value="08:00">

        <label>⛽ Среден разход (л / 100 км):</label>
        <input type="number" id="fuel-consumption" value="6.5" step="0.1">

        <label>💶 Цена на горивото за 1 литър (€):</label>
        <input type="number" id="fuel-price-eur" value="1.35" step="0.01">
    </div>
    
    <div id="segments-container"></div>

    <button onclick="runAppCalculation()">Изчисли пътуването</button>

    <div id="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>

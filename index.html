<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG-RouteMaster - Изцяло за България</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; margin-top: 5px; margin-bottom: 25px; }
        .input-group { background: #f1f5f9; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #cbd5e1; }
        .section-title { font-size: 16px; font-weight: bold; color: #0f172a; border-bottom: 2px solid #94a3b8; padding-bottom: 5px; margin-bottom: 15px; }
        .segment { background: #fff; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 6px; border-left: 4px solid #0284c7; }
        .segment h4 { margin: 0 0 8px 0; color: #1e293b; font-size: 14px; }
        label { display: block; font-size: 13px; margin-bottom: 3px; font-weight: bold; color: #475569; }
        input, select { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .calc-btn { width: 100%; padding: 15px; background-color: #0f172a; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #results { margin-top: 25px; padding: 18px; border-radius: 6px; display: block; line-height: 1.6; }
        .success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .warning-box { color: #991b1b; background-color: #fef2f2; border: 1px solid #fca5a5; padding: 10px; border-radius: 4px; margin-top: 12px; font-weight: bold; }
        optgroup { font-weight: bold; color: #0f172a; background: #e2e8f0; }
        option { font-weight: normal; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>BG-RouteMaster</h2>
    
    <div class="input-group">
        <label>Час на тръгване:</label>
        <input type="time" id="departure-time" value="08:00" oninput="calculateBulgariaTrip()">

        <label>Среден разход (л / 100 км):</label>
        <input type="number" id="fuel-consumption" value="6.5" step="0.1" oninput="calculateBulgariaTrip()">

        <label>Цена на горивото за 1 литър (лв):</label>
        <input type="number" id="fuel-price-bgn" value="2.65" step="0.01" oninput="calculateBulgariaTrip()">
    </div>

    <div class="input-group" style="background-color: #f8fafc; border-color: #cbd5e1;">
        <label style="color: #0f172a;">Избери дестинация в България:</label>
        <select id="route-select" onchange="updateRoute()">
            </select>
    </div>
    
    <div class="section-title">Разпределение на вътрешните отсечки</div>
    <div id="bg-segments-container"></div>

    <button class="calc-btn" onclick="calculateBulgariaTrip()">Преизчисли маршрута</button>
    <div id="results" class="success"></div>
</div>

<script>
// === QA ДЕБЪГЕР ===
window.onerror = function(message, source, lineno, colno, error) {
    alert("СЛУЧИ СЕ БЪГ!\n\nГрешка: " + message + "\nРед: " + lineno);
    return false;
};

const translations = {
    bg: {
        lblDist: "Разстояние (км):",
        lblSpeed: "Твоята Скорост (км/ч):",
        lblLimit: "Ограничение",
        resTitle: "Отчет за пътуването в България:",
        resArrival: "Очаквано пристигане:",
        resDist: "Общо разстояние по маршрута:",
        resTime: "Чисто време в път:",
        resFuel: "Изразходено гориво:",
        resPrice: "Обща цена за гориво:",
        hoursStr: "ч.",
        minStr: "мин.",
        warning: "Внимание: Скоростта ви надвишава ограниченията по ЗДвП! Внимавайте за камери на КАТ!"
    }
};

// БАЗА ДАННИ С ЧИСТИ БЪЛГАРСКИ ДЕСТИНАЦИИ И МАРШРУТИ
const bgRoutesDatabase = {
    "Южно Черноморие": {
        burgas: { name: "Бургас (през Хасково/Ямбол)", hasTwoSegments: true, seg1Dist: 195, seg1Speed: 85, seg1Allowed: 90, seg1Name: "Главен път (Кърджали - Бургас)", seg2Dist: 10, seg2Speed: 50, seg2Allowed: 60, seg2Name: "Градска мрежа Бургас" },
        sozopol: { name: "Созопол (Вътрешен маршрут)", hasTwoSegments: true, seg1Dist: 205, seg1Speed: 85, seg1Allowed: 90, seg1Name: "Път до Бургас", seg2Dist: 34, seg2Speed: 80, seg2Allowed: 90, seg2Name: "Четирилентов път Бургас - Созопол" }
    },
    "Планински дестинации и Родопи": {
        pamporovo: { name: "Пампорово (през Смолян)", hasTwoSegments: true, seg1Dist: 90, seg1Speed: 65, seg1Allowed: 90, seg1Name: "Републикански път Кърджали - Смолян", seg2Dist: 15, seg2Speed: 50, seg2Allowed: 80, seg2Name: "Планинско изкачване до курорта" },
        ardino: { name: "Ардино (Дяволски мост)", hasTwoSegments: true, seg1Dist: 32, seg1Speed: 55, seg1Allowed: 90, seg1Name: "Път Кърджали - Ардино", seg2Dist: 8, seg2Speed: 30, seg2Allowed: 90, seg2Name: "Локален тесен път до моста" }
    },
    "Големи градове": {
        plovdiv: { name: "Пловдив (през Асеновград)", hasTwoSegments: true, seg1Dist: 85, seg1Speed: 70, seg1Allowed: 90, seg1Name: "Път през Асеновградското дефиле", seg2Dist: 12, seg2Speed: 60, seg2Allowed: 80, seg2Name: "Асеновградско шосе навлизане" },
        sofia: { name: "София (Връзка с АМ Тракия)", hasTwoSegments: true, seg1Dist: 100, seg1Speed: 75, seg1Allowed: 90, seg1Name: "Кърджали - Включване на магистралата", seg2Dist: 145, seg2Speed: 120, seg2Allowed: 140, seg2Name: "Автомагистрала Тракия до София" }
    }
};

let selectedRouteKey = 'burgas';

function findRoute(key) {
    for (let group in bgRoutesDatabase) {
        if (bgRoutesDatabase[group][key]) {
            return bgRoutesDatabase[group][key];
        }
    }
    return null;
}

function populateRoutes() {
    const select = document.getElementById("route-select");
    if (!select) return;
    select.innerHTML = "";
    
    for (let group in bgRoutesDatabase) {
        let optGroup = document.createElement("optgroup");
        optGroup.label = group;
        
        for (let key in bgRoutesDatabase[group]) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = bgRoutesDatabase[group][key].name;
            if (key === selectedRouteKey) opt.selected = true;
            optGroup.appendChild(opt);
        }
        select.appendChild(optGroup);
    }
}

function updateRoute() {
    const select = document.getElementById("route-select");
    if (!select) return;
    selectedRouteKey = select.value;
    buildSegmentInputs();
    calculateBulgariaTrip();
}

function buildSegmentInputs() {
    const container = document.getElementById("bg-segments-container");
    if (!container) return;
    const t = translations.bg;
    const route = findRoute(selectedRouteKey);
    if (!route) return;

    let html = `
        <div class="segment">
            <h4>🚗 ${route.seg1Name} (${t.lblLimit}: ${route.seg1Allowed})</h4>
            <label>${t.lblDist}</label>
            <input type="number" id="bg_seg1-dist" value="${route.seg1Dist}" step="0.1" oninput="calculateBulgariaTrip()">
            <label>${t.lblSpeed}</label>
            <input type="number" id="bg_seg1-speed" value="${route.seg1Speed}" oninput="calculateBulgariaTrip()">
        </div>
    `;

    if (route.hasTwoSegments) {
        html += `
            <div class="segment" style="border-left-color: #f59e0b;">
                <h4>⛰️ ${route.seg2Name} (${t.lblLimit}: ${route.seg2Allowed})</h4>
                <label>${t.lblDist}</label>
                <input type="number" id="bg_seg2-dist" value="${route.seg2Dist}" step="0.1" oninput="calculateBulgariaTrip()">
                <label>${t.lblSpeed}</label>
                <input type="number" id="bg_seg2-speed" value="${route.seg2Speed}" oninput="calculateBulgariaTrip()">
            </div>
        `;
    }

    container.innerHTML = html;
}

function addMinutesToTime(baseHours, baseMinutes, addedMinutes) {
    let totalMin = baseMinutes + Math.round(addedMinutes);
    let totalHr = baseHours + Math.floor(totalMin / 60);
    totalMin = totalMin % 60;
    totalHr = totalHr % 24;
    return `${String(totalHr).padStart(2, '0')}:${String(totalMin).padStart(2, '0')}`;
}

function calculateBulgariaTrip() {
    const t = translations.bg;
    const route = findRoute(selectedRouteKey);
    if (!route) return;

    const depTimeInput = document.getElementById("departure-time");
    if (!depTimeInput || !depTimeInput.value) return;
    
    const [depHours, depMinutes] = depTimeInput.value.split(":").map(Number);
    const fuelConsumption = parseFloat(document.getElementById("fuel-consumption").value) || 0;
    const fuelPriceBGN = parseFloat(document.getElementById("fuel-price-bgn").value) || 0;

    let totalTime = 0;
    let totalDistance = 0;
    let speedWarning = false;

    const s1DistInput = document.getElementById("bg_seg1-dist");
    const s1SpeedInput = document.getElementById("bg_seg1-speed");
    if (s1DistInput && s1SpeedInput) {
        const s1Dist = parseFloat(s1DistInput.value) || 0;
        const s1Speed = parseFloat(s1SpeedInput.value) || 0;
        if (s1Dist > 0 && s1Speed > 0) {
            totalTime += s1Dist / s1Speed;
            totalDistance += s1Dist;
            if (s1Speed > route.seg1Allowed) speedWarning = true;
        }
    }

    const s2DistInput = document.getElementById("bg_seg2-dist");
    const s2SpeedInput = document.getElementById("bg_seg2-speed");
    if (route.hasTwoSegments && s2DistInput && s2SpeedInput) {
        const s2Dist = parseFloat(s2DistInput.value) || 0;
        const s2Speed = parseFloat(s2SpeedInput.value) || 0;
        if (s2Dist > 0 && s2Speed > 0) {
            totalTime += s2Dist / s2Speed;
            totalDistance += s2Dist;
            if (s2Speed > route.seg2Allowed) speedWarning = true;
        }
    }

    let totalFuelLitres = (totalDistance * fuelConsumption) / 100;
    let totalFuelCostBGN = totalFuelLitres * fuelPriceBGN;

    const arrivalTimeFormatted = addMinutesToTime(depHours, depMinutes, totalTime * 60);
    const totalDurationMinutes = totalTime * 60;
    const durationHours = Math.floor(totalDurationMinutes / 60);
    const durationMinutes = Math.round(totalDurationMinutes % 60);

    let resultsHTML = `
        <h3>${t.resTitle}</h3>
        <p style="font-size: 17px;"><strong>${t.resArrival} <span style="color: #0284c7;">${arrivalTimeFormatted} ${t.hoursStr}</span></strong></p>
        <p><strong>${t.resDist}</strong> ${totalDistance.toFixed(1)} км</p>
        <p><strong>${t.resTime}</strong> ${durationHours} ${t.hoursStr} ${durationMinutes} ${t.minStr}</p>
        <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 12px 0;">
        <p>${t.resFuel} ${totalFuelLitres.toFixed(2)} л</p>
        <p style="font-size: 16px;"><strong>${t.resPrice} <span style="color: #166534;">${totalFuelCostBGN.toFixed(2)} лв.</span></strong></p>
    `;

    if (speedWarning) {
        resultsHTML += `<div class="warning-box">${t.warning}</div>`;
    }

    const resultsDiv = document.getElementById("results");
    if (resultsDiv) {
        resultsDiv.innerHTML = resultsHTML;
    }
}

populateRoutes();
buildSegmentInputs();
calculateBulgariaTrip();
</script>
</body>
</html>
